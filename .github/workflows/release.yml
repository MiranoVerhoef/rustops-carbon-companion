name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version and manifest
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          grep -F "[Info(\"RustOpsCompanion\", \"RustOps\", \"$version\")]" RustOpsCompanion.cs
          test "$(jq -r .version release.json)" = "$version"
          test "$(sha256sum RustOpsCompanion.cs | cut -d' ' -f1)" = "$(jq -r .sha256 release.json)"
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            RustOpsCompanion.cs
            release.json
